<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" width="1600" height="1200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="60%" stop-color="#050d17"/>
      <stop offset="100%" stop-color="#020508"/>
    </radialGradient>
    <radialGradient id="glow1" cx="45%" cy="35%" r="30%">
      <stop offset="0%" stop-color="#3b82f620"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="65%" cy="55%" r="25%">
      <stop offset="0%" stop-color="#60a5fa15"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60a5fa80" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3b82f600"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="1600" height="1200" fill="url(#bg)"/>
  <rect width="1600" height="1200" fill="url(#glow1)"/>
  <rect width="1600" height="1200" fill="url(#glow2)"/>

  <g opacity="0.05" stroke="#3b82f6" stroke-width="0.5">
