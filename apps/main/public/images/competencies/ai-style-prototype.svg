    <rect x="280" y="1070" width="1040" height="1.5" rx="1" fill="#3b82f6"/>
    <rect x="330" y="1085" width="940" height="1" rx="1" fill="#3b82f6"/>
    <rect x="380" y="1100" width="840" height="0.8" rx="1" fill="#3b82f6"/>
