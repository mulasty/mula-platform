    <line x1="750" y1="520" x2="330" y2="580"/>
    <line x1="750" y1="520" x2="480" y2="780"/>
    <line x1="750" y1="520" x2="720" y2="860"/>
    <line x1="750" y1="520" x2="1020" y2="360"/>
    <line x1="750" y1="520" x2="1120" y2="590"/>
    <line x1="750" y1="520" x2="1060" y2="760"/>
    <line x1="750" y1="520" x2="960" y2="910"/>
  </g>

  <g filter="url(#glow)">
    <circle cx="400" cy="280" r="16" fill="#0d1f3c" stroke="#3b82f6" stroke-width="1.5"/>
    <circle cx="400" cy="280" r="5" fill="#3b82f6" opacity="0.8"/>
    <circle cx="1020" cy="360" r="13" fill="#0d1f3c" stroke="#60a5fa" stroke-width="1.5"/>
    <circle cx="1020" cy="360" r="4" fill="#60a5fa" opacity="0.7"/>
    <circle cx="330" cy="580" r="15" fill="#0d1f3c" stroke="#3b82f6" stroke-width="1.5"/>
    <circle cx="330" cy="580" r="5" fill="#3b82f6" opacity="0.7"/>
    <circle cx="1120" cy="590" r="11" fill="#0d1f3c" stroke="#2563eb" stroke-width="1.5"/>
    <circle cx="1120" cy="590" r="4" fill="#2563eb" opacity="0.7"/>
    <circle cx="480" cy="780" r="14" fill="#0d1f3c" stroke="#3b82f6" stroke-width="1.5"/>
    <circle cx="480" cy="780" r="5" fill="#3b82f6" opacity="0.7"/>
    <circle cx="1060" cy="760" r="12" fill="#0d1f3c" stroke="#60a5fa" stroke-width="1.5"/>
    <circle cx="1060" cy="760" r="4" fill="#60a5fa" opacity="0.7"/>
    <circle cx="720" cy="860" r="13" fill="#0d1f3c" stroke="#3b82f6" stroke-width="1.5"/>
    <circle cx="720" cy="860" r="4" fill="#3b82f6" opacity="0.7"/>
    <circle cx="960" cy="910" r="11" fill="#0d1f3c" stroke="#2563eb" stroke-width="1.5"/>
    <circle cx="960" cy="910" r="4" fill="#2563eb" opacity="0.6"/>
  </g>

  <g filter="url(#softGlow)">
    <circle cx="750" cy="520" r="70" fill="#3b82f608"/>
  </g>
  <g filter="url(#glow)">
    <circle cx="750" cy="520" r="28" fill="#0d1f3c" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="750" cy="520" r="10" fill="#3b82f6" opacity="0.35"/>
    <circle cx="750" cy="520" r="42" fill="none" stroke="#3b82f6" stroke-width="0.5" opacity="0.2"/>
    <circle cx="750" cy="520" r="62" fill="none" stroke="#3b82f6" stroke-width="0.3" opacity="0.12"/>
  </g>

  <g opacity="0.06">
